services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: sre_bootcamp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d sre_bootcamp"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/75asu/sre-bootcamp-one2n:${IMAGE_TAG}
    entrypoint: ["./migrate"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: pguser
      DB_PASSWORD: pgpass
      DB_NAME: sre_bootcamp
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api1:
    image: ghcr.io/75asu/sre-bootcamp-one2n:${IMAGE_TAG}
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: pguser
      DB_PASSWORD: pgpass
      DB_NAME: sre_bootcamp
      DB_SSLMODE: disable
      GIN_MODE: release
      PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  api2:
    image: ghcr.io/75asu/sre-bootcamp-one2n:${IMAGE_TAG}
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: pguser
      DB_PASSWORD: pgpass
      DB_NAME: sre_bootcamp
      DB_SSLMODE: disable
      GIN_MODE: release
      PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

volumes:
  pgdata:
